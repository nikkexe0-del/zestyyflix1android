name: Build Signed APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Download Gradle wrapper jar
        run: |
          curl -fL \
            https://github.com/gradle/gradle/raw/refs/tags/v8.6.0/gradle/wrapper/gradle-wrapper.jar \
            -o android/gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --stacktrace

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/zestyyflix-v1.0.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zestyyflix-apk
          path: android/app/build/outputs/apk/release/zestyyflix-v1.0.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Zestyyflix v1.0.${{ github.run_number }}"
          body: |
            🎬 **Zestyyflix** — All OTTs. One App. No BS.

            Download the APK below and install directly on your Android device.

            > Enable "Install from unknown sources" in Settings if prompted.
          files: android/app/build/outputs/apk/release/zestyyflix-v1.0.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
